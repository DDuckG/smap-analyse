metadata:
  name: smap-social-intel-base
  version: "2026.03.22-identity-spine"
  description: >
    General-purpose social listening base ontology. The base layer stays domain
    neutral and business-readable. Domain overlays extend it with catalog
    entities, domain phrasing, and domain-compatible aspect and issue cues.

entity_types:
  - brand
  - product
  - product_line
  - category
  - feature
  - issue
  - benefit
  - campaign
  - retailer
  - influencer
  - organization
  - person
  - location
  - facility
  - concept

