topics:
  - topic_key: blockchain_basics_and_explainers
    label: Blockchain Basics and Explainers
    description: Educational and explainer discussion about chains, wallets, and core blockchain concepts.
    knowledge_layer: domain
    topic_family: education
    main_path_policy: core
    seed_phrases: ["blockchain la gi", "defi la gi", "wallet la gi", "smart contract", "onchain la gi"]
    related_entity_ids: ["brand.ethereum", "product.metamask", "concept.bridge", "concept.gas_fee"]
    related_aspect_ids: ["usability_onboarding"]
    compatible_entity_types: ["brand", "product", "concept"]
  - topic_key: blockchain_defi_swaps_and_liquidity
    label: DeFi Swaps, Lending, and Liquidity
    description: Swaps, pools, lending, yield, and slippage discussion.
    knowledge_layer: domain
