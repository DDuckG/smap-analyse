aspect_categories:
  - id: security_safety
    label: Security and Safety
    description: Wallet safety, contract safety, and operational security.
    seed_phrases: ["bao mat", "security", "safe", "wallet safety", "drain wallet", "secure"]
    compatible_entity_types: ["brand", "product", "organization", "concept"]
    linked_topic_keys: ["blockchain_scam_phishing_and_wallet_safety", "blockchain_wallet_setup_and_recovery"]
    related_issue_ids: ["phishing_wallet_drain", "rugpull_scam_risk", "wallet_recovery_problem", "smart_contract_bug"]
  - id: usability_onboarding
    label: Usability and Onboarding
    description: Ease of setup, onboarding, and user flow.
    seed_phrases: ["de dung", "usability", "setup", "wallet setup", "new user", "onboarding"]
    compatible_entity_types: ["product", "organization", "concept"]
    linked_topic_keys: ["blockchain_basics_and_explainers", "blockchain_wallet_setup_and_recovery", "blockchain_exchange_kyc_and_offramp"]
  - id: fees_gas
    label: Fees and Gas
    description: Network fees, gas costs, and transaction cost concerns.
    seed_phrases: ["gas fee", "phi", "fee", "expensive gas", "slippage", "transaction fee"]
    compatible_entity_types: ["brand", "product", "organization", "concept"]
    linked_topic_keys: ["blockchain_defi_swaps_and_liquidity", "blockchain_bridge_and_cross_chain_transfer", "blockchain_chain_and_ecosystem_comparison"]
    related_issue_ids: ["high_gas_fee_problem", "slippage_liquidity_problem"]
  - id: speed_finality
    label: Speed and Finality
    description: Transaction speed, confirmation time, and chain responsiveness.
    seed_phrases: ["fast", "nhanh", "slow", "pending", "finality", "speed"]
    compatible_entity_types: ["brand", "product", "concept"]
    linked_topic_keys: ["blockchain_chain_and_ecosystem_comparison", "blockchain_bridge_and_cross_chain_transfer"]
    related_issue_ids: ["failed_transfer_or_stuck_tx"]
  - id: decentralization
    label: Decentralization
    description: Network openness, validator concentration, and censorship-resistance discussion.
    seed_phrases: ["decentralized", "tap trung", "validator", "permissionless", "phi tap trung"]
    compatible_entity_types: ["brand", "concept"]
    linked_topic_keys: ["blockchain_chain_and_ecosystem_comparison", "blockchain_regulation_compliance_and_tax"]
  - id: compliance_kyc
    label: Compliance and KYC
    description: Identity verification, compliance checks, and regulatory friction.
    seed_phrases: ["kyc", "compliance", "verify", "xac minh", "withdrawal freeze", "tax"]
    compatible_entity_types: ["organization", "concept"]
    linked_topic_keys: ["blockchain_exchange_kyc_and_offramp", "blockchain_regulation_compliance_and_tax"]
    related_issue_ids: ["kyc_withdrawal_block"]
  - id: liquidity_depth
    label: Liquidity
    description: Liquidity depth, swap execution, and trading depth.
    seed_phrases: ["liquidity", "depth", "tvl", "pool", "slippage", "thin book"]
    compatible_entity_types: ["product", "organization", "concept"]
    linked_topic_keys: ["blockchain_defi_swaps_and_liquidity", "blockchain_market_narratives_and_altcoins"]
    related_issue_ids: ["slippage_liquidity_problem"]
  - id: interoperability
    label: Interoperability
    description: Cross-chain movement, bridging, and multi-chain compatibility.
    seed_phrases: ["bridge", "cross chain", "multi chain", "interoperability", "layerzero"]
    compatible_entity_types: ["brand", "product", "concept"]
    linked_topic_keys: ["blockchain_bridge_and_cross_chain_transfer", "blockchain_chain_and_ecosystem_comparison"]
    related_issue_ids: ["bridge_exploit_or_failed_bridge"]
  - id: airdrop_eligibility
    label: Airdrop Eligibility
    description: Farming, task completion, and eligibility discussion.
    seed_phrases: ["airdrop", "eligibility", "farm", "point", "snapshot", "galxe"]
    compatible_entity_types: ["brand", "product", "concept"]
    linked_topic_keys: ["blockchain_airdrop_eligibility_and_farming", "blockchain_scam_phishing_and_wallet_safety"]
    related_issue_ids: ["fake_airdrop_problem"]
