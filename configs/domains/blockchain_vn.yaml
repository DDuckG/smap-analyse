issue_categories:
  - id: phishing_wallet_drain
    label: Phishing or Wallet Drain
    description: Fake links, malicious approvals, and wallet draining risk.
    seed_phrases: ["phishing", "drain wallet", "fake link", "approval scam", "connect wallet la mat"]
    compatible_entity_types: ["product", "organization", "concept"]
    linked_topic_keys: ["blockchain_scam_phishing_and_wallet_safety", "blockchain_wallet_setup_and_recovery"]
    related_aspect_ids: ["security_safety"]
  - id: rugpull_scam_risk
    label: Rug Pull or Scam Risk
    description: Project-level scam or rug-pull suspicion.
    seed_phrases: ["rug pull", "scam", "project lua dao", "exit liquidity", "ponzi"]
    compatible_entity_types: ["brand", "product", "concept"]
    linked_topic_keys: ["blockchain_scam_phishing_and_wallet_safety", "blockchain_market_narratives_and_altcoins"]
    related_aspect_ids: ["security_safety", "liquidity_depth"]
  - id: bridge_exploit_or_failed_bridge
    label: Bridge Exploit or Failed Bridge
    description: Bridge exploit, bridging failure, or cross-chain loss.
    seed_phrases: ["bridge exploit", "bridge failed", "cross chain loi", "bridge stuck", "mat tien bridge"]
    compatible_entity_types: ["brand", "product", "concept"]
    linked_topic_keys: ["blockchain_bridge_and_cross_chain_transfer", "blockchain_scam_phishing_and_wallet_safety"]
    related_aspect_ids: ["interoperability", "security_safety"]
  - id: failed_transfer_or_stuck_tx
    label: Failed Transfer or Stuck Transaction
    description: Pending or failed transfers and stuck transactions.
    seed_phrases: ["pending", "stuck tx", "failed transfer", "khong den", "transaction fail"]
    compatible_entity_types: ["brand", "product", "organization", "concept"]
    linked_topic_keys: ["blockchain_bridge_and_cross_chain_transfer", "blockchain_exchange_kyc_and_offramp"]
    related_aspect_ids: ["speed_finality", "fees_gas"]
  - id: wallet_recovery_problem
    label: Wallet Recovery Problem
    description: Seed phrase, recovery, and account access problems.
    seed_phrases: ["seed phrase", "recovery", "mat vi", "khong vao duoc wallet", "khong backup"]
    compatible_entity_types: ["product", "concept"]
    linked_topic_keys: ["blockchain_wallet_setup_and_recovery", "blockchain_scam_phishing_and_wallet_safety"]
    related_aspect_ids: ["security_safety", "usability_onboarding"]
  - id: high_gas_fee_problem
    label: High Gas Fee
    description: Gas fee or transaction fee is too expensive.
    seed_phrases: ["gas fee cao", "phi cao", "expensive gas", "fee chat", "network fee"]
    compatible_entity_types: ["brand", "product", "concept"]
    linked_topic_keys: ["blockchain_bridge_and_cross_chain_transfer", "blockchain_defi_swaps_and_liquidity", "blockchain_chain_and_ecosystem_comparison"]
    related_aspect_ids: ["fees_gas"]
  - id: kyc_withdrawal_block
    label: KYC or Withdrawal Block
    description: Exchange verification or withdrawal is blocked or delayed.
    seed_phrases: ["kyc pending", "verify fail", "withdraw bi khoa", "rut tien cham", "freeze"]
    compatible_entity_types: ["organization", "concept"]
    linked_topic_keys: ["blockchain_exchange_kyc_and_offramp", "blockchain_regulation_compliance_and_tax"]
    related_aspect_ids: ["compliance_kyc"]
  - id: fake_airdrop_problem
    label: Fake Airdrop or Fake Eligibility
    description: Fake airdrop tasks, phishing forms, or misleading eligibility bait.
    seed_phrases: ["fake airdrop", "fake galxe", "eligibility scam", "airdrop lua", "claim gia"]
    compatible_entity_types: ["product", "concept"]
    linked_topic_keys: ["blockchain_airdrop_eligibility_and_farming", "blockchain_scam_phishing_and_wallet_safety"]
    related_aspect_ids: ["airdrop_eligibility", "security_safety"]
  - id: smart_contract_bug
    label: Smart Contract Bug
    description: Contract bug, exploit, or approval risk discussion.
    seed_phrases: ["smart contract bug", "exploit", "approval risk", "contract loi", "hack contract"]
    compatible_entity_types: ["product", "concept"]
    linked_topic_keys: ["blockchain_defi_swaps_and_liquidity", "blockchain_scam_phishing_and_wallet_safety"]
    related_aspect_ids: ["security_safety", "interoperability"]
  - id: slippage_liquidity_problem
    label: Slippage or Liquidity Problem
    description: Poor execution, thin pools, or bad liquidity.
    seed_phrases: ["slippage", "thin liquidity", "pool mong", "gia truot", "swap xau"]
    compatible_entity_types: ["product", "concept"]
    linked_topic_keys: ["blockchain_defi_swaps_and_liquidity", "blockchain_market_narratives_and_altcoins"]
    related_aspect_ids: ["liquidity_depth", "fees_gas"]
