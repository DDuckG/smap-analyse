    linked_topic_keys: ["beer_refreshment_and_drinkability", "beer_food_pairing_and_nhau_context"]
    related_issue_ids: ["warm_serving"]
  - id: carbonation
    label: Carbonation
    description: Bubble feel, fizz, and flatness discussion.
