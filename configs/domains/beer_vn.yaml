issue_categories:
  - id: stale_flat_beer
    label: Stale or Flat Beer
    description: Beer tastes flat, lacks fizz, or feels stale.
    seed_phrases: ["flat", "het ga", "nhat", "stale", "mat bot"]
    compatible_entity_types: ["brand", "product", "retailer", "organization"]
    linked_topic_keys: ["beer_freshness_storage_and_authenticity", "beer_serving_experience_and_venue_service"]
    related_aspect_ids: ["freshness", "carbonation"]
  - id: watered_down_concern
    label: Watered-down Concern
    description: Discussion that beer feels diluted or too thin.
    seed_phrases: ["loang", "nhat", "watered down", "it vi", "bi pha"]
    compatible_entity_types: ["brand", "product", "retailer", "organization"]
    linked_topic_keys: ["beer_taste_and_bitterness", "beer_refreshment_and_drinkability"]
    related_aspect_ids: ["taste_profile", "smoothness"]
  - id: warm_serving
    label: Warm Serving
    description: Beer served warm or not chilled enough.
    seed_phrases: ["khong lanh", "am", "warm beer", "it da", "mat khong toi"]
    compatible_entity_types: ["brand", "product", "retailer", "organization"]
    linked_topic_keys: ["beer_serving_experience_and_venue_service", "beer_refreshment_and_drinkability"]
    related_aspect_ids: ["serving_temperature", "refreshment"]
  - id: fake_refilled_concern
    label: Fake or Refilled Concern
    description: Suspicion of fake bottle, refilled beer, or inauthentic stock.
    seed_phrases: ["fake", "refill", "that gia", "khong chinh hang", "gia mao"]
    compatible_entity_types: ["brand", "product", "retailer", "organization"]
    linked_topic_keys: ["beer_freshness_storage_and_authenticity", "beer_availability_and_where_to_buy"]
    related_aspect_ids: ["authenticity", "freshness"]
  - id: overpriced_at_venue
    label: Overpriced at Venue
    description: Beer is overpriced at a bar, restaurant, or venue.
    seed_phrases: ["dat qua", "price cao", "overpriced", "chat", "mark up"]
    compatible_entity_types: ["brand", "product", "retailer", "organization"]
    linked_topic_keys: ["beer_price_value_and_promotions", "beer_serving_experience_and_venue_service"]
    related_aspect_ids: ["price_value", "venue_service"]
  - id: out_of_stock
    label: Out of Stock
    description: Product or tap is unavailable.
    seed_phrases: ["het hang", "khong co", "sold out", "khong tim thay", "out of stock"]
    compatible_entity_types: ["brand", "product", "retailer", "organization"]
    linked_topic_keys: ["beer_availability_and_where_to_buy"]
    related_aspect_ids: ["availability"]
  - id: bad_service_at_venue
    label: Bad Venue Service
    description: Service or serving process at venue is poor.
    seed_phrases: ["phuc vu te", "service te", "cho lau", "staff te", "phuc vu cham"]
    compatible_entity_types: ["retailer", "organization", "location"]
    linked_topic_keys: ["beer_serving_experience_and_venue_service", "beer_craft_brewpub_and_sampling"]
    related_aspect_ids: ["venue_service"]
  - id: off_flavor_problem
    label: Off-flavor Problem
    description: Beer has weird smell, metallic taste, or bad aftertaste.
    seed_phrases: ["mui la", "off flavor", "kim loai", "chua la", "hau vi xau"]
    compatible_entity_types: ["brand", "product", "retailer", "organization"]
    linked_topic_keys: ["beer_taste_and_bitterness", "beer_freshness_storage_and_authenticity"]
    related_aspect_ids: ["taste_profile", "aroma", "freshness"]
  - id: damaged_packaging
    label: Damaged Packaging
    description: Can or bottle is dented, leaking, or otherwise damaged.
    seed_phrases: ["mep lon", "be chai", "dent", "leak", "nut nap"]
    compatible_entity_types: ["brand", "product", "retailer", "organization"]
    linked_topic_keys: ["beer_packaging_format_and_convenience", "beer_availability_and_where_to_buy"]
    related_aspect_ids: ["packaging_format"]
