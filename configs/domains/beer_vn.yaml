metadata:
  name: beer-vn
  version: "2026.03.30-domain-pack"
  description: Sharp Vietnam beer domain ontology for mass beer, craft beer, venue service, and drinking-context social listening.
domain_id: beer_vn
entity_types:
  - brand
  - product
  - product_line
  - retailer
  - organization
  - person
  - location
  - facility
  - concept
taxonomy_nodes:
  - id: category.consumer_goods
    label: Consumer Goods
    node_type: category
  - id: category.beer_and_alcohol
    label: Beer and Alcohol
    node_type: category
  - id: category.mass_beer
    label: Mass Beer
    node_type: category
  - id: category.craft_beer
    label: Craft Beer
    node_type: category
  - id: category.imported_beer
    label: Imported Beer
    node_type: category
  - id: category.food_service
    label: Food Service
    node_type: category
  - id: category.retail
    label: Retail
    node_type: category
aspect_categories:
  - id: taste_profile
    label: Taste Profile
    description: General taste, flavor balance, and drinkability discussion.
    seed_phrases: ["vi", "taste", "flavor", "de uong", "ngon", "hau vi"]
    compatible_entity_types: ["brand", "product", "concept"]
    linked_topic_keys: ["beer_taste_and_bitterness", "beer_refreshment_and_drinkability", "beer_brand_and_product_comparison"]
  - id: bitterness
    label: Bitterness
    description: Discussion of bitterness level, hop bite, and harshness.
    seed_phrases: ["dang", "bitter", "bitterness", "hop", "gai"]
    compatible_entity_types: ["brand", "product", "concept"]
    linked_topic_keys: ["beer_taste_and_bitterness", "beer_craft_brewpub_and_sampling"]
    related_issue_ids: ["off_flavor_problem"]
  - id: smoothness
    label: Smoothness
    description: Smoothness, ease of drinking, and finish softness.
    seed_phrases: ["mem", "smooth", "de uong", "u mem", "em"]
    compatible_entity_types: ["brand", "product", "concept"]
    linked_topic_keys: ["beer_refreshment_and_drinkability", "beer_brand_and_product_comparison"]
  - id: aroma
    label: Aroma
    description: Aroma, nose, and fragrance discussion.
    seed_phrases: ["mui", "aroma", "huong", "thom", "floral"]
    compatible_entity_types: ["brand", "product", "concept"]
    linked_topic_keys: ["beer_taste_and_bitterness", "beer_craft_brewpub_and_sampling"]
